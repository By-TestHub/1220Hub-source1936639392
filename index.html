<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTHUB-Getkey</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #030a16; color: #ffffff; overflow: hidden;
        }
        .bg-animated {
            position: absolute; top: -50%; left: -50%; width: 200vw; height: 200vh;
            background: radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(0, 255, 255, 0.2) 0%, transparent 30%);
            animation: moveGradient 15s infinite alternate ease-in-out; z-index: 1;
        }
        @keyframes moveGradient {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 15%) scale(1.2); }
        }
        .glass-panel {
            position: relative; z-index: 2; background: rgba(10, 25, 45, 0.6); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(0, 198, 255, 0.3);
            border-top: 1px solid rgba(0, 198, 255, 0.6); border-radius: 20px; padding: 40px; width: 90%; max-width: 450px;
            text-align: center; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 198, 255, 0.1);
        }
        h1 { margin-top: 0; font-size: 32px; letter-spacing: 2px; color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .key-container {
            background: rgba(0, 0, 0, 0.5); border: 2px dashed #0088ff; border-radius: 12px;
            padding: 20px; margin: 25px 0; font-size: 28px; font-weight: 900; color: #ffffff;
            letter-spacing: 3px; text-shadow: 0 0 8px #0088ff;
        }
        .timer-box { font-size: 18px; margin-bottom: 25px; color: #a0c4ff; }
        .timer-box span { font-size: 26px; font-weight: bold; color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.6); display: block; margin-top: 5px; }
        .copy-btn {
            background: linear-gradient(90deg, #0072ff, #00c6ff); border: none; border-radius: 10px;
            padding: 15px 0; width: 100%; color: white; font-size: 18px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
        }
        .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 198, 255, 0.7); }
        
        .error-404 { display: none; text-align: center; font-family: sans-serif; color: #333; background: #f0f2f5; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        .error-404 h1 { font-size: 100px; color: #444; margin: 0; text-shadow: none; }
        .error-404 p { font-size: 20px; color: #666; }
        .error-404 a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #0072ff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 999; align-items: center; justify-content: center; }
        .modal-box { background: white; color: #333; padding: 30px 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 250px; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-icon { width: 70px; height: 70px; border: 4px solid #a5dc86; border-radius: 50%; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .modal-icon::after { content: ''; width: 20px; height: 40px; border: solid #a5dc86; border-width: 0 4px 4px 0; transform: rotate(45deg); margin-bottom: 8px; }
        .modal-title { font-size: 26px; font-weight: bold; margin-bottom: 15px; color: #595959; }
        .modal-text { font-size: 16px; color: #545454; margin-bottom: 30px; }
        .modal-btn { background: #7066e0; color: white; border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="error-404" id="errorPage">
        <h1>404</h1>
        <p>Not Found - คีย์หมดอายุกรุณาหาคีย์ใหม่</p>
        <a href="https://linkvertise.com/access/7125323/Q1MKBTl9dRkn">เข้าหน้าเว็บหาคีย์ใหม่</a>
    </div>

    <div class="bg-animated"></div>

    <div class="glass-panel" id="mainPanel">
        <h1>Key TEST HUB </h1>
        <div class="timer-box">คีย์จะรีเซ็ตในอีก<span id="countdown">--:--:--</span></div>
        <div class="key-container" id="keyDisplay">Loading...</div>
        <button class="copy-btn" id="copyBtn" onclick="copyKey()">คัดลอกคีย์</button>
    </div>

    <div class="modal-overlay" id="successModal"><div class="modal-box"><div class="modal-icon"></div><div class="modal-title">สำเร็จ</div><div class="modal-text">คัดลอกคีย์สำเร็จ !</div><button class="modal-btn" onclick="closeModal()">OK</button></div></div>

    <script>

        const allowedReferrer = "linkvertise.com";
        const ref = document.referrer.toLowerCase();

        if (ref === "" || !ref.includes(allowedReferrer)) {
            document.getElementById("mainPanel").style.display = "none";
            document.getElementById("errorPage").style.display = "flex";
        }

        let currentKey = "";

        function updateSystem() {
            const now = new Date();
            const interval = 8 * 60 * 60 * 1000; 
            const timeSinceEpoch = now.getTime();
            
            const currentBlock = Math.floor(timeSinceEpoch / interval);
            const nextBlockTime = (currentBlock + 1) * interval;
            const timeLeft = nextBlockTime - timeSinceEpoch;

            if (timeLeft <= 1000) {
                location.reload();
            }

            let hash = 0;
            let str = "TESTHUB_SUPER_SECRET_" + currentBlock;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0; 
            }
            const randomPart = Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
            currentKey = "TESTHUB-" + randomPart;
            document.getElementById("keyDisplay").innerText = currentKey;

            const h = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
            const m = Math.floor((timeLeft / 1000 / 60) % 60);
            const s = Math.floor((timeLeft / 1000) % 60);
            
            document.getElementById("countdown").innerText = 
                String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
        }

        function copyKey() {
            navigator.clipboard.writeText(currentKey).then(() => {
                document.getElementById("successModal").style.display = "flex";
            });
        }

        function closeModal() {
            document.getElementById("successModal").style.display = "none";
        }

        updateSystem();
        setInterval(updateSystem, 1000);
    </script>
</body>
</html>
