<!DOCTYPE html>
<html>
<head>
    <title>TESTHUB | Get Key</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
               background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; font-family: sans-serif; }
        .card { background: rgba(0,0,0,0.3); padding: 40px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        #key-display { font-size: 24px; font-weight: bold; margin: 20px 0; padding: 10px; background: #fff; color: #0072ff; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TESTHUB KEY</h1>
        <p>คีย์เปลี่ยนทุก 8 ชั่วโมง</p>
        <div id="key-display">กำลังโหลด...</div>
        <p>หมดอายุใน: <span id="timer">--:--:--</span></p>
        <button onclick="window.location.href='https://linkvertise.com/YOUR_LINK_HERE'">กดเพื่อผ่าน Linkvertise</button>
    </div>

    <script>
        function generateKey() {
            const interval = 8 * 60 * 60 * 1000;
            const seed = Math.floor(Date.now() / interval);
            const key = "TESTHUB-" + btoa(seed).substring(0, 8).toUpperCase();
            document.getElementById('key-display').innerText = key;
        }
        generateKey();
        setInterval(generateKey, 1000);
    </script>
</body>
</html>
